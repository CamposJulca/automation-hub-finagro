# ══════════════════════════════════════════════════════════════════════════════
# Hub Portal — nginx portal-only (despliegue modular ilab)
# ──────────────────────────────────────────────────────────────────────────────
# Un solo server en el :9000 interno (el compose lo publica como 172.16.0.98:9100).
# Solo enruta al backend del hub; NO referencia upstreams de sarlaft/siga/nlp para
# que nginx arranque sin esos servicios (el portal es lanzadera + login del hub).
# ══════════════════════════════════════════════════════════════════════════════

client_max_body_size 100M;

server {
    listen 9000;

    # SPA del portal
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # API del hub (login + registro de apps / landing)
    location /api/ {
        proxy_pass         http://backend:8000/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Django admin del hub
    location /admin/ {
        proxy_pass         http://backend:8000/admin/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
