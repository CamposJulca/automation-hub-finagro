networks:
  finagro-net:
    driver: bridge

services:

  # ── Base de datos ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-automation_hub}
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - finagro-net

  # ── Servicio NLP (interno — solo accesible por backend) ──────────────────────
  nlp-camara:
    build:
      context: ../nlp-camara
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - finagro-net

  # ── Servicio FactIA (interno — descarga y procesa facturas electrónicas) ─────
  factia:
    build:
      context: ../FactIA
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env.prod
    environment:
      FACTIA_DATA_DIR: /data/factia
    volumes:
      - factia_data:/data/factia
    networks:
      - finagro-net

  # ── Backend Django + Gunicorn ────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    env_file: .env.prod
    environment:
      DATABASE_URL:    "true"
      DB_HOST:         db
      NLP_CAMARA_URL:  http://nlp-camara:8001
      FACTIA_URL:      http://factia:8002
      ALLOWED_HOSTS:   "*"
    depends_on:
      - db
      - nlp-camara
      - factia
    restart: unless-stopped
    networks:
      - finagro-net

  # ── SIGA — Beneficios de Salud ───────────────────────────────────────────────
  siga:
    build:
      context: ../siga
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    volumes:
      - siga_db:/app/db
      - siga_landing:/storage/landing
    networks:
      - finagro-net

  # ── Frontend React + Nginx (6 puertos) ───────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend.prod
    ports:
      - "9000:9000"   # automation-hub-finagro  → Portal principal
      - "9001:9001"   # facturacion-electronica  → Módulo Facturación
      - "9002:9002"   # sarlaft                  → Módulo SARLAFT
      - "9003:9003"   # gestion-administrativa   → Módulo Gestión Admin.
      - "9004:9004"   # mesa-ayuda               → Módulo Mesa de Ayuda
    depends_on:
      - backend
      - siga
    restart: unless-stopped
    networks:
      - finagro-net

volumes:
  postgres_data_prod:
  factia_data:
  siga_db:
  siga_landing:
