# ── Configuración compartida ──────────────────────────────────────────────────
# Tamaño máximo de subida (varios PDFs)
client_max_body_size 100M;

# ── Macro para proxy headers ──────────────────────────────────────────────────
# (usada en cada server block mediante include inline)

# ══════════════════════════════════════════════════════════════════════════════
# Puerto 9000 · Portal principal — Automation Hub
# ══════════════════════════════════════════════════════════════════════════════
server {
    listen 9000;

    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location ~ ^/api/facturacion/(descargar|procesar)/stream/ {
        proxy_pass              http://backend:8000;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_read_timeout      3600s;
        proxy_buffering         off;
        proxy_cache             off;
        chunked_transfer_encoding on;
    }

    location /api/facturacion/descargar-carpetas/ {
        proxy_pass         http://backend:8000/api/facturacion/descargar-carpetas/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_buffering    off;
    }

    location /api/ {
        proxy_pass         http://backend:8000/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /siga-api/ {
        proxy_pass         http://siga:8000/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 50M;
    }

    location /admin/ {
        proxy_pass         http://backend:8000/admin/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ══════════════════════════════════════════════════════════════════════════════
# Puerto 9001 · Módulo Facturación Electrónica
# ══════════════════════════════════════════════════════════════════════════════
server {
    listen 9001;

    # Redirige la raíz al módulo correspondiente en la SPA
    location = / {
        return 302 /facturacion/;
    }

    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location ~ ^/api/facturacion/(descargar|procesar)/stream/ {
        proxy_pass              http://backend:8000;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_read_timeout      3600s;
        proxy_buffering         off;
        proxy_cache             off;
        chunked_transfer_encoding on;
    }

    location /api/facturacion/descargar-carpetas/ {
        proxy_pass         http://backend:8000/api/facturacion/descargar-carpetas/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_buffering    off;
    }

    location /api/ {
        proxy_pass         http://backend:8000/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

